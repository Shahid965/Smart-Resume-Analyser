{% extends "base.html" %}
{% block title %}LinkedIn Audit | Zenith Ultra{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto py-24 px-10">
    <div id="input-area" class="text-center">
        <h1 class="text-6xl font-black uppercase mb-4" style="font-family: 'Outfit';">LinkedIn <span class="text-blue-500">Audit.</span></h1>
        <p class="text-slate-500 text-xs tracking-widest uppercase mb-12">No Resume Required. Pure Social Optimization.</p>
        
        <div class="glass p-16 rounded-[4rem] border-t-8 border-blue-500 shadow-2xl">
            <input type="text" id="link" placeholder="PASTE PROFILE LINK (e.g., linkedin.com/in/user)" class="w-full bg-white/5 border border-white/10 p-6 rounded-2xl text-[10px] font-bold text-white mb-8 outline-none focus:border-blue-500 text-center">
            <button onclick="runAudit()" id="btn" class="w-full py-6 bg-blue-600 rounded-2xl font-black text-[10px] tracking-widest hover:bg-white hover:text-black transition uppercase">Perform Neural Audit</button>
        </div>
    </div>

    <div id="result-area" class="hidden space-y-8 animate-fade">
        <div class="glass p-12 rounded-[4rem] border-l-8 border-blue-500 flex justify-between items-center">
            <h2 class="text-4xl font-black uppercase">Optimization Index</h2>
            <div class="text-right"><h3 id="score" class="text-7xl font-black text-blue-500">0</h3><p class="text-[10px] font-bold">READY TO SCALE</p></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-10 rounded-[3rem] border border-blue-500/10">
                <h4 class="text-blue-400 font-bold mb-6 uppercase text-xs">Visual Branding</h4>
                <p id="visual" class="text-xs text-slate-300 leading-relaxed"></p>
            </div>
            <div class="glass p-10 rounded-[3rem] border border-emerald-500/10">
                <h4 class="text-emerald-400 font-bold mb-6 uppercase text-xs">Headline Formulas</h4>
                <div id="headlines" class="space-y-3"></div>
            </div>
        </div>

        <div class="glass p-10 rounded-[3rem] border border-purple-500/10">
            <h4 class="text-purple-400 font-bold mb-6 uppercase text-xs">AI Content Roadmap</h4>
            <div id="content" class="flex flex-wrap gap-2"></div>
        </div>
    </div>
</div>

<script>
async function runAudit() {
    const link = document.getElementById('link').value;
    if(!link) return alert("Enter Link");
    document.getElementById('btn').innerText = "AUDITING SOCIAL DNA...";
    
    const fd = new FormData();
    fd.append('link', link);
    
    const res = await fetch('/analyze_linkedin', {method:'POST', body:fd});
    const d = await res.json();
    
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('result-area').classList.remove('hidden');
    
    document.getElementById('score').innerText = d.ai.profile_score;
    document.getElementById('visual').innerText = d.ai.visual_branding;
    document.getElementById('headlines').innerHTML = d.ai.headline_strategies.map(h => `<div class='text-[10px] border-l border-white/10 pl-4 py-1'>${h}</div>`).join('');
    document.getElementById('content').innerHTML = d.ai.content_roadmap.map(c => `<span class='bg-blue-500/10 text-blue-400 px-3 py-1 rounded text-[10px]'>${c}</span>`).join('');
}
</script>
{% endblock %}
