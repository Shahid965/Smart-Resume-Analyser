{% extends "base.html" %}
{% block content %}
<style>
    #layout { transition: 1.2s cubic-bezier(0.7,0,0.3,1); display: flex; align-items: center; justify-content: center; min-height: 85vh; }
    .sidebar-mode { justify-content: flex-start !important; padding-left: 60px; }
    #console { width: 480px; transition: 0.8s; z-index: 10; }
    .sidebar-mode #console { width: 340px; transform: scale(0.9); }
    #results { display: none; opacity: 0; transition: 1s; flex: 1; margin-left: 60px; padding-right: 60px; }
    .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; padding: 2.5rem; backdrop-filter: blur(10px); }
    .hero-title { font-family: 'Outfit'; font-size: 5rem; background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>

<div class="p-10">
    <header class="text-center mb-16 mt-6 animate-fade">
        <h1 class="hero-title uppercase tracking-tighter">Smart Resume Analyser</h1>
        <p class="text-indigo-500 font-black tracking-[0.8em] text-[10px] uppercase">Intelligence Portal v3.0</p>
    </header>

    <main id="layout">
        <!-- INPUT CONSOLE -->
        <div id="console" class="card shadow-2xl">
            <div class="flex bg-white/5 p-1 rounded-2xl mb-8">
                <button onclick="setRole('jobseeker')" id="js" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-indigo-600 transition-all">JOB SEEKER</button>
                <button onclick="setRole('recruiter')" id="rc" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all">RECRUITER</button>
            </div>
            <textarea id="jd" class="w-full h-32 bg-black/40 border border-white/10 rounded-2xl p-5 text-[11px] text-white outline-none focus:border-indigo-500 mb-6" placeholder="TARGET JOB DESCRIPTION (OPTIONAL)"></textarea>
            
            <label class="w-full h-40 border-2 border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer mb-8 hover:bg-indigo-500/5 transition-all">
                <div class="text-3xl mb-2">📁</div>
                <span id="fileLabel" class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Upload CV (PDF/DOCX)</span>
                <input type="file" id="fileIn" class="hidden" onchange="document.getElementById('fileLabel').innerText='READY: '+this.files[0].name.toUpperCase()">
            </label>
            
            <button onclick="runAnalysis()" id="runBtn" class="w-full py-5 bg-white text-black rounded-2xl font-black text-[11px] tracking-[0.2em] hover:bg-indigo-600 hover:text-white transition-all transform active:scale-95">INITIALIZE NEURAL SCAN</button>
        </div>

        <!-- RESULTS DASHBOARD -->
        <div id="results" class="space-y-8">
            <!-- Header -->
            <div class="card border-l-8 border-indigo-500 flex justify-between items-center shadow-2xl">
                <div>
                    <h2 id="rName" class="text-6xl font-black tracking-tighter uppercase">CANDIDATE</h2>
                    <div class="flex space-x-6 mt-3">
                        <p id="rEmail" class="text-indigo-400 font-bold text-xs uppercase"></p>
                        <p id="rPhone" class="text-slate-500 font-bold text-xs uppercase"></p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-black tracking-widest">ATS MATCH</p>
                    <h3 id="rScore" class="text-8xl font-black text-white">0%</h3>
                </div>
            </div>

            <!-- Main Data Row -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="card">
                    <h4 class="text-indigo-400 font-black text-[11px] mb-8 tracking-[0.3em] uppercase">Professional Feedback</h4>
                    <p id="rFeedback" class="text-sm text-slate-300 leading-relaxed italic mb-6"></p>
                    <div id="rStrengths" class="space-y-3"></div>
                </div>
                <div class="card">
                    <h4 class="text-indigo-400 font-black text-[11px] mb-8 tracking-[0.3em] uppercase">Career Journey</h4>
                    <div id="rTimeline" class="space-y-6 border-l-2 border-white/5 ml-2"></div>
                </div>
            </div>

            <!-- Multi-Grid Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="card">
                    <h4 class="text-emerald-400 font-black text-[10px] mb-6 uppercase tracking-widest">Qualifications</h4>
                    <div id="rQuals" class="space-y-2 text-[11px] text-slate-400 font-medium"></div>
                </div>
                <div class="card">
                    <h4 class="text-blue-400 font-black text-[10px] mb-6 uppercase tracking-widest">Skill Matrix</h4>
                    <div id="rSkills" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="card">
                    <h4 class="text-purple-400 font-black text-[10px] mb-6 uppercase tracking-widest">Extracted Projects</h4>
                    <div id="rProjects" class="space-y-2 text-[11px] text-slate-400 font-medium"></div>
                </div>
            </div>

            <!-- Gap Analysis -->
            <div class="card border border-red-500/20">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <h4 class="text-red-400 font-black text-[10px] mb-6 uppercase tracking-widest">JD Critical Gaps</h4>
                        <div id="rGaps" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div>
                        <h4 class="text-yellow-400 font-black text-[10px] mb-6 uppercase tracking-widest">Suggested Projects</h4>
                        <div id="rBuild" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let role = 'jobseeker';
    function setRole(r) {
        role = r;
        document.getElementById('js').style.background = r === 'jobseeker' ? '#4f46e5' : 'transparent';
        document.getElementById('rc').style.background = r === 'recruiter' ? '#4f46e5' : 'transparent';
    }

    async function runAnalysis() {
        const file = document.getElementById('fileIn').files[0];
        if (!file) return alert("System requires a PDF/DOCX file.");
        
        const runBtn = document.getElementById('runBtn');
        runBtn.innerText = "SCANNING PROFESSIONAL DNA...";
        runBtn.disabled = true;

        const fd = new FormData();
        fd.append('resume', file);
        fd.append('jd', document.getElementById('jd').value);
        fd.append('role', role);

        try {
            const res = await fetch('/analyze', { method: 'POST', body: fd });
            const d = await res.json();

            if(d.error) throw new Error(d.error);

            // Trigger Animation
            document.getElementById('layout').classList.add('sidebar-mode');
            
            setTimeout(() => {
                const results = document.getElementById('results');
                results.style.display = 'block';
                setTimeout(() => results.style.opacity = '1', 100);

                // SAFE MAPPING (Falling back to empty array if keys are missing)
                const ai = d.ai || {};
                const prof = d.profile || {};

                document.getElementById('rName').innerText = prof.name || "Candidate";
                document.getElementById('rEmail').innerText = prof.email || "Email N/A";
                document.getElementById('rPhone').innerText = prof.phone || "Phone N/A";
                document.getElementById('rScore').innerText = (d.score || 0) + "%";
                
                document.getElementById('rFeedback').innerText = ai.feedback || "Strategic analysis complete.";
                
                document.getElementById('rStrengths').innerHTML = (ai.strengths || []).map(s => 
                    `<div class='text-[10px] bg-indigo-500/10 border border-indigo-500/20 p-3 rounded-xl'>✅ ${s}</div>`).join('');
                
                document.getElementById('rTimeline').innerHTML = (ai.experience_summary || []).map(e => 
                    `<div class='pl-6 relative py-2'><div class='absolute left-[-5px] top-4 w-2 h-2 rounded-full bg-indigo-500 shadow-[0_0_10px_#4f46e5]'></div><p class='text-[11px] font-bold text-slate-200'>${e}</p></div>`).join('');
                
                document.getElementById('rQuals').innerHTML = (ai.qualifications || []).map(q => `<div>▹ ${q}</div>`).join('');
                
                document.getElementById('rSkills').innerHTML = (ai.skills || []).map(s => 
                    `<span class='bg-white/5 border border-white/10 px-3 py-1 rounded-full text-[10px] font-bold'>${s}</span>`).join('');
                
                document.getElementById('rProjects').innerHTML = (ai.projects || []).map(p => `<div>▹ ${p}</div>`).join('');
                
                document.getElementById('rGaps').innerHTML = (ai.missing_skills || []).map(s => 
                    `<span class='bg-red-500/10 text-red-400 border border-red-500/20 px-3 py-1 rounded-full text-[10px] font-bold'>${s}</span>`).join('');
                
                document.getElementById('rBuild').innerHTML = (ai.suggested_projects || []).map(p => 
                    `<div class='text-[10px] bg-white/5 p-3 rounded-2xl border border-white/5'>🛠 ${p}</div>`).join('');

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 800);

        } catch (e) {
            alert("ANALYSIS ERROR: " + e.message);
        } finally {
            runBtn.innerText = "INITIALIZE NEURAL SCAN";
            runBtn.disabled = false;
        }
    }
</script>
{% endblock %}
